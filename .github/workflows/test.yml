name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. 安装 JDK（必须）
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. 缓存 Gradle（加速）
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      # 4. 关键：生成 local.properties（解决你的报错）
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # （可选）如果你项目需要签名，这里可以补
      # - name: Add signing config
      #   run: |
      #     echo "storeFile=xxx.jks" >> local.properties
      #     echo "storePassword=xxx" >> local.properties
      #     echo "keyAlias=xxx" >> local.properties
      #     echo "keyPassword=xxx" >> local.properties

      # 5. 构建 APK
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --build-cache --parallel --warning-mode all

      # 6. 收集 APK（稳定路径）
      - name: Prepare APK
        run: |
          mkdir -p apk
          find . -type f -name "*.apk" -path "*/build/outputs/apk/*" -exec cp {} apk/ \;

      # 7. 上传产物
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: apk
          if-no-files-found: warn
